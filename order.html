<!DOCTYPE html>
<html lang="en">
<head>
  <title>Order Now</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
  <style>
    body{
      text-align: center;
    }
    form {
      margin: auto;
      width: fit-content;
      background-color: rgba(228, 142, 44, 0.826);
      padding: 20px;
    }
  </style>
</head>
<body>
     <div>
    <h1>Welcome</h1>
    <h1>Make your happiness with our coffee </h1>
  </div>
        <form action="index.html">
    <div>
      <h3><label>Email</label></h3>
      <input type="email" required placeholder="Write A Valid Email">
      <br>
      <h3><label>Location</label></h3>
        <input type="text" required placeholder="Write Your Location">
    <br>
        <div>
      <h3><label>Your number</label></h3>
      <input type="number" required placeholder="Write Your Number">
      <h3>What is your favourite Drink Today?</h3>
      <ul style="list-style: square;">
        <li><label><input type="radio" name="drink" value="coffee"> Coffee</label></li>
        <li><label><input type="radio" name="drink" value="tea"> Tea</label></li>
      </ul>
    </div>  
    <div>
      <textarea name="order" id="" placeholder="Type your order here..." required></textarea>
    </div> 
<div>
     <button type="Submit" value="Submit">
        <input type="submit" value="Submit">
</div>
</div>
  </form>
<a href="menu.html" style="font-size: 48px;">View Menu!</a>
</body>
</html>
